name: CI

on:
  push:
    paths:
      - 'monopoly_web_game/**'
  pull_request:
    paths:
      - 'monopoly_web_game/**'

defaults:
  run:
    working-directory: monopoly_web_game

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: monopoly_web_game/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run lint
      - run: npm run build
